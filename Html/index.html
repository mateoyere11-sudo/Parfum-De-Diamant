<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-brands/css/uicons-brands.css'>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="shortcut icon" href="../imagenes/logo.png" type="image/x-icon">
    <title>Registro - Parfum de diamant</title>
</head>

<body>
    <main class="cont">

        <section class="contenedor-login">
            <div class="tarjeta-login">
                <div class="login-encabezado">
                    <h2 class="Titulo-form">Parfum <span class="Gld">de diamant</span></h2>
                    <hr class="linea-dorada">
                    <h3>Registrarse</h3>
                </div>

                <form action="">
                    <div class="nom grupo-input">
                        <label for="nombre">Nombre</label>
                        <div class="input-icono">
                            <i class="fi fi-rr-user"></i>
                            <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>
                        </div>
                        <small id="alert1" class="alerta-mensaje"></small>
                    </div>

                    <div class="contr grupo-input">
                        <label for="contrasena">Contraseña</label>
                        <div class="input-icono">
                            <i class="fi fi-rr-lock"></i>
                            <input type="password" id="contrasena" placeholder="Crea una contraseña" required>
                        </div>
                        <small id="alert2" class="alerta-mensaje"></small>
                    </div>

                    <div class="conf_contr grupo-input">
                        <label for="contrasena_conf">Confirma la contraseña</label>
                        <div class="input-icono">
                            <i class="fi fi-rr-shield-check"></i>
                            <input type="password" id="contrasena_conf" placeholder="Confirma tu contraseña" required>
                        </div>
                        <small id="alert3" class="alerta-mensaje"></small>
                    </div>

                    <div class="btns login-acciones">
                        <button type="button" onclick="registrarUsuario()"
                            class="btn_regis btn-dorado">Registrarse</button>
                    </div>
                    <p id="iniciar" class="Iniciar">¿Ya Tienes una cuenta? Iniciar sesión</p>
                </form>
            </div>
        </section>

        <section class="contenedor-iniciar ocultar">
            <div class="tarjeta-login">
                <div class="login-encabezado">
                    <h2 class="Titulo-form">Parfum <span class="Gld">de diamant</span></h2>
                    <hr class="linea-dorada">
                    <h3>Iniciar sesion</h3>
                </div>

                <form action="">
                    <div class="nom grupo-input">
                        <label for="nombre">Nombre</label>
                        <div class="input-icono">
                            <i class="fi fi-rr-user"></i>
                            <input type="text" id="nombre_i" placeholder="Ingresa tu nombre" required>
                        </div>
                        <small id="alert1_i" class="alerta-mensaje"></small>
                    </div>

                    <div class="contr grupo-input">
                        <label for="contrasena">Contraseña</label>
                        <div class="input-icono">
                            <i class="fi fi-rr-lock"></i>
                            <input type="password" id="contrasena_i" placeholder="Ingrese la contraseña" required>
                        </div>
                        <small id="alert2_i" class="alerta-mensaje"></small>
                    </div>

                    <div class="btns login-acciones">
                        <button type="button" onclick="iniciarUsuario()" class="btn_regis btn-dorado">iniciar
                            Sesion</button>
                    </div>
                    <p id="regis" class="Iniciar">¿No tienes una cuenta? Registrarse</p>
                </form>
            </div>
        </section>

    </main>

    <script src="../js/interactividad.js"></script>
    <script src="../js/form.js"></script>
</body>

</html>
